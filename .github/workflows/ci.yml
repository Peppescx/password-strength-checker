name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Installazione dal file indicato (assicurati che esista nella root)
        if [ -f requirements_dev.txt ]; then pip install -r requirements_dev.txt; fi
        # Installazione forzata dei tool richiesti se non presenti nel file
        pip install isort pylint pytest pytest-cov

    - name: Run isort (Check imports)
      run: isort --check-only src tests

    - name: Run Pylint (Check code quality)
      # Usa il file .pylintrc presente nella root
      run: pylint $(git ls-files '*.py')

    - name: Run Tests with Coverage (Min 75%)
      run: |
        # Esegue i test e fallisce se la copertura totale è inferiore al 75%
        pytest --cov=src tests/ --cov-fail-under=75 --cov-report=term-missing